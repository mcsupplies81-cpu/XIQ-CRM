name: Outbound — Daily Send

on:
  schedule:
    # 7:30 AM PT = 14:30 UTC (PDT, UTC-7)
    - cron: '30 14 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run daily send
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTBOUND_INBOXES: ${{ secrets.OUTBOUND_INBOXES }}
          GMAIL_REFRESH_TOKEN_CAMERON_USEXIQ_COM: ${{ secrets.GMAIL_REFRESH_TOKEN_CAMERON_USEXIQ_COM }}
          GMAIL_REFRESH_TOKEN_CM_USEXIQ_COM: ${{ secrets.GMAIL_REFRESH_TOKEN_CM_USEXIQ_COM }}
          GMAIL_REFRESH_TOKEN_CAM_USEXIQ_COM: ${{ secrets.GMAIL_REFRESH_TOKEN_CAM_USEXIQ_COM }}
          SLACK_OUTBOUND_WEBHOOK: ${{ secrets.SLACK_OUTBOUND_WEBHOOK }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: node outbound/scripts/send-daily.cjs
